version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-spring-boot
    restart: unless-stopped
    environment:
      POSTGRES_DB: banking_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5332:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data: